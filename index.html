<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pascal Demos — COR24</title>
    <link data-trunk rel="rust" data-bin="web-p24c" />
    <link data-trunk rel="css" href="src/app.css" />
    <style>
        /* Catppuccin Mocha */
        :root {
            --crust: #11111b;
            --mantle: #181825;
            --base: #1e1e2e;
            --surface0: #313244;
            --surface1: #45475a;
            --surface2: #585b70;
            --overlay0: #6c7086;
            --overlay1: #7f849c;
            --overlay2: #9399b2;
            --subtext0: #a6adc8;
            --subtext1: #bac2de;
            --text: #cdd6f4;
            --lavender: #b4befe;
            --blue: #89b4fa;
            --sapphire: #74c7ec;
            --sky: #89dceb;
            --teal: #94e2d5;
            --green: #a6e3a1;
            --yellow: #f9e2af;
            --peach: #fab387;
            --maroon: #eba0ac;
            --red: #f38ba8;
            --mauve: #cba6f7;
            --pink: #f5c2e7;
            --flamingo: #f2cdcd;
            --rosewater: #f5e0dc;
            --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--mono);
            font-size: 15px;
            background: var(--base);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
